<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quechee Inn — Room Assignments</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; font-family: 'Nunito Sans', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    input:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    const ROOM_DATA = {
      1:  { type: "QDLX", beds: "Queen", maxOcc: 2, features: "Walk-in Shower w/ Seat" },
      2:  { type: "KING", beds: "King", maxOcc: 3, features: "Full Bath, Double Sink" },
      3:  { type: "KING", beds: "King", maxOcc: 3, features: "Full Bath & Fireplace" },
      4:  { type: "QDLX", beds: "Queen", maxOcc: 3, features: "Full Bath, Corner Room" },
      5:  { type: "QDLX", beds: "Queen", maxOcc: 2, features: "Full Bath, Corner Room" },
      6:  { type: "QS", beds: "Queen", maxOcc: 2, features: "Walk-in Shower" },
      7:  { type: "QS", beds: "Queen", maxOcc: 2, features: "Walk-in Shower" },
      8:  { type: "QDLX", beds: "Queen", maxOcc: 3, features: "Walk-in Shower" },
      9:  { type: "QDLX", beds: "Queen", maxOcc: 3, features: "Full Bath" },
      10: { type: "KING", beds: "King", maxOcc: 3, features: "Walk-in Shower" },
      11: { type: "KING", beds: "King", maxOcc: 3, features: "2 Full Baths" },
      12: { type: "QS", beds: "Queen", maxOcc: 2, features: "Full Bath" },
      14: { type: "QS", beds: "Queen", maxOcc: 2, features: "Full Bath" },
      15: { type: "KING", beds: "King", maxOcc: 3, features: "Full Bath" },
      16: { type: "SUITE", beds: "Queen", maxOcc: 4, features: "Coach House Suite, Sofa Bed" },
      17: { type: "QS", beds: "Queen", maxOcc: 2, features: "Full Bath" },
      18: { type: "QQ", beds: "2 Queens", maxOcc: 4, features: "Full Bath" },
      19: { type: "QQ", beds: "2 Queens", maxOcc: 5, features: "Day Bed & Full Bath" },
      20: { type: "QQ", beds: "2 Queens", maxOcc: 5, features: "Day Bed & Full Bath" },
      21: { type: "QQ", beds: "2 Queens", maxOcc: 5, features: "Day Bed & Full Bath" },
      22: { type: "SUITE", beds: "King", maxOcc: 4, features: "Bridal Suite, Sofa Bed" },
      23: { type: "QQ", beds: "2 Queens", maxOcc: 4, features: "Walk-in Shower" },
      24: { type: "KING", beds: "King", maxOcc: 3, features: "Full Bath" },
      25: { type: "SUITE", beds: "King+Dbl+Twin", maxOcc: 7, features: "Groomsmen Suite, Full Kitchen" },
      26: { type: "QDLX", beds: "Queen", maxOcc: 2, features: "Full Bath" },
    };

    const TYPE_STYLES = {
      KING:  { bg: "#8B9E7C", border: "#6B7F5C", label: "King" },
      QDLX:  { bg: "#D4A574", border: "#B8895A", label: "Queen DLX" },
      QS:    { bg: "#C9B99A", border: "#A89A7B", label: "Queen Std" },
      QQ:    { bg: "#E8C4A0", border: "#C9A67E", label: "2 Queens" },
      SUITE: { bg: "#D4918E", border: "#B87370", label: "Suite" },
    };

    const FIRST_FLOOR_ROOM_NUMS = [1,2,3,4,5,6,23,24,25,26];

    function RoomBox({ roomNum, style: posStyle, onSelect, isSelected, guestCount, guests }) {
      const data = ROOM_DATA[roomNum];
      const typeStyle = TYPE_STYLES[data.type];
      const filled = guestCount > 0;

      const getInitials = (name) => {
        const parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        if (parts[0].length >= 1) return parts[0][0].toUpperCase();
        return "";
      };

      const guestInitials = guests.filter((g) => g.trim()).map(getInitials);

      return (
        <div
          onClick={() => onSelect(roomNum)}
          style={{
            position: "absolute",
            ...posStyle,
            background: isSelected ? "#5C6B4F" : filled ? typeStyle.bg : "#F5F0E8",
            border: "2px solid " + (isSelected ? "#3D4A33" : filled ? typeStyle.border : "#D5CCBC"),
            borderRadius: "6px",
            cursor: "pointer",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            gap: "1px",
            transition: "all 0.2s ease",
            boxShadow: isSelected ? "0 4px 16px rgba(92,107,79,0.4)" : "0 1px 4px rgba(0,0,0,0.08)",
            zIndex: isSelected ? 10 : 1,
            overflow: "hidden",
            padding: "2px",
          }}
        >
          <span style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: filled ? "clamp(13px, 1.6vw, 17px)" : "clamp(16px, 2vw, 22px)",
            fontWeight: 700,
            color: isSelected ? "#F5F0E8" : filled ? "#3D2B1F" : "#8A7D6B",
            lineHeight: 1,
          }}>{roomNum}</span>
          {!filled && (
            <span style={{
              fontSize: "clamp(7px, 0.8vw, 9px)",
              fontWeight: 600,
              color: isSelected ? "#C9DDB8" : "#A89A7B",
              fontFamily: "'Nunito Sans', sans-serif",
              letterSpacing: "0.3px",
              marginTop: "1px",
              textTransform: "uppercase",
            }}>{data.type}</span>
          )}
          {filled && (
            <div style={{
              display: "flex",
              flexWrap: "wrap",
              gap: "2px",
              justifyContent: "center",
              alignItems: "center",
              marginTop: "1px",
            }}>
              {guestInitials.map((initials, i) => (
                <span key={i} style={{
                  background: isSelected ? "rgba(245,240,232,0.25)" : "rgba(61,43,31,0.15)",
                  color: isSelected ? "#F5F0E8" : "#3D2B1F",
                  fontSize: "clamp(7px, 0.75vw, 9px)",
                  fontWeight: 700,
                  fontFamily: "'Nunito Sans', sans-serif",
                  padding: "1px 4px",
                  borderRadius: "3px",
                  letterSpacing: "0.5px",
                  lineHeight: 1.3,
                }}>{initials}</span>
              ))}
            </div>
          )}
        </div>
      );
    }

    function LabelBox({ text, style: posStyle, italic }) {
      return (
        <div style={{
          position: "absolute", ...posStyle,
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "#8A7D6B",
          fontFamily: italic ? "'Cormorant Garamond', serif" : "'Nunito Sans', sans-serif",
          fontStyle: italic ? "italic" : "normal",
          fontSize: italic ? "clamp(10px, 1.1vw, 13px)" : "clamp(8px, 0.85vw, 10px)",
          fontWeight: italic ? 500 : 600,
          letterSpacing: italic ? "0.5px" : "1px",
          textTransform: italic ? "none" : "uppercase",
          pointerEvents: "none", textAlign: "center", lineHeight: 1.2,
        }}>{text}</div>
      );
    }

    function GuestPanel({ roomNum, assignments, onChange, onClose }) {
      const data = ROOM_DATA[roomNum];
      const typeStyle = TYPE_STYLES[data.type];
      const guests = assignments[roomNum] || [""];

      const updateGuest = (i, val) => { const u = [...guests]; u[i] = val; onChange(roomNum, u); };
      const addGuest = () => { if (guests.length < data.maxOcc) onChange(roomNum, [...guests, ""]); };
      const removeGuest = (i) => { const u = guests.filter((_, idx) => idx !== i); onChange(roomNum, u.length ? u : [""]); };

      return (
        <div style={{
          background: "#FFFCF7", borderRadius: "12px", border: "1px solid #D5CCBC",
          padding: "20px", boxShadow: "0 8px 32px rgba(61,43,31,0.12)", width: "100%", maxWidth: "360px",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "14px" }}>
            <div>
              <div style={{ display: "flex", alignItems: "baseline", gap: "10px" }}>
                <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "32px", fontWeight: 700, color: "#3D2B1F", lineHeight: 1 }}>
                  Room {roomNum}
                </span>
              </div>
              <div style={{
                display: "inline-block", background: typeStyle.bg, color: "#3D2B1F",
                fontSize: "10px", fontWeight: 700, padding: "3px 10px", borderRadius: "20px",
                fontFamily: "'Nunito Sans', sans-serif", letterSpacing: "0.5px", marginTop: "6px", textTransform: "uppercase",
              }}>{typeStyle.label}</div>
            </div>
            <button onClick={onClose} style={{
              background: "none", border: "none", cursor: "pointer",
              color: "#A89A7B", fontSize: "22px", lineHeight: 1, padding: "0 4px",
            }}>&times;</button>
          </div>

          <div style={{ display: "flex", gap: "16px", marginBottom: "16px", fontSize: "12px", color: "#6B5D4F", fontFamily: "'Nunito Sans', sans-serif" }}>
            <div><span style={{ fontWeight: 700 }}>Beds:</span> {data.beds}</div>
            <div><span style={{ fontWeight: 700 }}>Max:</span> {data.maxOcc}</div>
          </div>
          <div style={{ fontSize: "11px", color: "#8A7D6B", fontFamily: "'Nunito Sans', sans-serif", marginBottom: "16px", fontStyle: "italic" }}>{data.features}</div>

          <div style={{ borderTop: "1px solid #E8E0D4", paddingTop: "14px" }}>
            <div style={{ fontSize: "10px", fontWeight: 700, color: "#A89A7B", fontFamily: "'Nunito Sans', sans-serif", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "10px" }}>Guest Names</div>
            {guests.map((g, i) => (
              <div key={i} style={{ display: "flex", gap: "8px", marginBottom: "8px", alignItems: "center" }}>
                <input type="text" value={g} onChange={(e) => updateGuest(i, e.target.value)}
                  placeholder={"Guest " + (i + 1)} autoFocus={i === guests.length - 1}
                  style={{
                    flex: 1, padding: "9px 12px", background: "#F5F0E8", border: "1px solid #D5CCBC",
                    borderRadius: "8px", color: "#3D2B1F", fontSize: "14px",
                    fontFamily: "'Cormorant Garamond', serif", fontWeight: 600, transition: "border-color 0.15s",
                  }}
                  onFocus={(e) => { e.target.style.borderColor = "#8B9E7C"; }}
                  onBlur={(e) => { e.target.style.borderColor = "#D5CCBC"; }}
                />
                {guests.length > 1 && (
                  <button onClick={() => removeGuest(i)} style={{
                    background: "#F5F0E8", border: "1px solid #D5CCBC", borderRadius: "8px",
                    width: "34px", height: "34px", cursor: "pointer", color: "#A89A7B", fontSize: "16px",
                    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s",
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.background = "#D4918E"; e.currentTarget.style.color = "#fff"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.background = "#F5F0E8"; e.currentTarget.style.color = "#A89A7B"; }}
                  >&times;</button>
                )}
              </div>
            ))}
            {guests.length < data.maxOcc && (
              <button onClick={addGuest} style={{
                width: "100%", padding: "8px", background: "none", border: "1px dashed #C9B99A",
                borderRadius: "8px", color: "#8A7D6B", fontSize: "12px", fontFamily: "'Nunito Sans', sans-serif",
                fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#8B9E7C"; e.currentTarget.style.color = "#5C6B4F"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#C9B99A"; e.currentTarget.style.color = "#8A7D6B"; }}
              >+ Add Guest ({guests.length}/{data.maxOcc})</button>
            )}
          </div>
        </div>
      );
    }

    function QuecheeInnMap() {
      const [assignments, setAssignments] = useState(() => {
        const init = {};
        Object.keys(ROOM_DATA).forEach((r) => { init[r] = [""]; });
        return init;
      });
      const [selectedRoom, setSelectedRoom] = useState(null);
      const [activeFloor, setActiveFloor] = useState("first");

      const handleSelect = useCallback((roomNum) => {
        setSelectedRoom((prev) => (prev === roomNum ? null : roomNum));
      }, []);

      const handleChange = useCallback((roomNum, guests) => {
        setAssignments((prev) => ({ ...prev, [roomNum]: guests }));
      }, []);

      const guestCount = (roomNum) => (assignments[roomNum] || [""]).filter((g) => g.trim()).length;
      const totalGuests = Object.values(assignments).flat().filter((g) => g.trim()).length;
      const totalCapacity = Object.values(ROOM_DATA).reduce((s, r) => s + r.maxOcc, 0);

      const clearAll = () => {
        const cleared = {};
        Object.keys(ROOM_DATA).forEach((r) => { cleared[r] = [""]; });
        setAssignments(cleared);
        setSelectedRoom(null);
      };

      const firstFloorRooms = {
        1:  { left: "44%", top: "40%", width: "10%", height: "14%" },
        2:  { left: "55%", top: "40%", width: "10%", height: "14%" },
        3:  { left: "67%", top: "40%", width: "12%", height: "14%" },
        4:  { left: "81%", top: "40%", width: "10%", height: "14%" },
        26: { left: "49%", top: "62%", width: "13%", height: "14%" },
        6:  { left: "73%", top: "62%", width: "9%",  height: "14%" },
        5:  { left: "83%", top: "62%", width: "9%",  height: "14%" },
        24: { left: "22%", top: "5%",  width: "13%", height: "14%" },
        23: { left: "37%", top: "5%",  width: "13%", height: "14%" },
        25: { left: "3%",  top: "24%", width: "13%", height: "16%" },
      };

      const firstFloorLabels = [
        { text: "Porter Library", style: { left: "25%", top: "24%", width: "16%", height: "7%" }, italic: true },
        { text: "Patio", style: { left: "46%", top: "24%", width: "10%", height: "7%" }, italic: true },
        { text: "Kitchen", style: { left: "22%", top: "40%", width: "7%", height: "14%" }, italic: true },
        { text: "Dining Room", style: { left: "29%", top: "33%", width: "13%", height: "7%" }, italic: true },
        { text: "Bar", style: { left: "20%", top: "55%", width: "10%", height: "7%" }, italic: true },
        { text: "Common Room", style: { left: "17%", top: "63%", width: "13%", height: "5%" }, italic: true },
        { text: "Gallery", style: { left: "17%", top: "73%", width: "13%", height: "9%" }, italic: true },
        { text: "Office", style: { left: "37%", top: "64%", width: "10%", height: "9%" }, italic: true },
        { text: "Front Entry", style: { left: "30%", top: "87%", width: "13%", height: "5%" }, italic: true },
        { text: "Ground Level", style: { left: "3%", top: "42%", width: "13%", height: "4%" }, italic: true },
        { text: "First Floor", style: { left: "55%", top: "30%", width: "13%", height: "5%" } },
      ];

      const secondFloorRooms = {
        22: { left: "23%", top: "3%",  width: "15%", height: "12%" },
        21: { left: "26%", top: "17%", width: "12%", height: "10%" },
        20: { left: "26%", top: "28%", width: "12%", height: "10%" },
        19: { left: "26%", top: "39%", width: "12%", height: "10%" },
        18: { left: "26%", top: "50%", width: "12%", height: "12%" },
        14: { left: "39%", top: "53%", width: "10%", height: "11%" },
        12: { left: "50%", top: "53%", width: "10%", height: "11%" },
        11: { left: "61%", top: "53%", width: "10%", height: "11%" },
        10: { left: "72%", top: "53%", width: "11%", height: "11%" },
        9:  { left: "85%", top: "53%", width: "10%", height: "11%" },
        16: { left: "3%",  top: "76%", width: "13%", height: "11%" },
        17: { left: "18%", top: "76%", width: "12%", height: "11%" },
        15: { left: "32%", top: "76%", width: "13%", height: "11%" },
        7:  { left: "77%", top: "76%", width: "9%",  height: "11%" },
        8:  { left: "87%", top: "76%", width: "9%",  height: "11%" },
      };

      const secondFloorLabels = [
        { text: "Second Floor", style: { left: "48%", top: "36%", width: "16%", height: "5%" } },
        { text: "Sun Porch", style: { left: "50%", top: "80%", width: "16%", height: "5%" }, italic: true },
        { text: "Entry / Exit", style: { left: "3%", top: "17%", width: "12%", height: "5%" }, italic: true },
        { text: "Stairs", style: { left: "18%", top: "66%", width: "10%", height: "4%" }, italic: true },
        { text: "Stairs", style: { left: "72%", top: "68%", width: "10%", height: "4%" }, italic: true },
      ];

      const currentRooms = activeFloor === "first" ? firstFloorRooms : secondFloorRooms;
      const currentLabels = activeFloor === "first" ? firstFloorLabels : secondFloorLabels;

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", fontFamily: "'Nunito Sans', sans-serif" }}>

          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #3D2B1F 0%, #5C4A3A 100%)", padding: "24px 28px 20px", borderBottom: "3px solid #8B9E7C" }}>
            <div style={{ maxWidth: "1200px", margin: "0 auto" }}>
              <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "space-between", alignItems: "flex-end", gap: "16px" }}>
                <div>
                  <div style={{ fontSize: "10px", letterSpacing: "3px", color: "#C9B99A", textTransform: "uppercase", fontWeight: 700, marginBottom: "4px" }}>
                    Quechee Inn at Marshland Farm
                  </div>
                  <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(24px, 3.5vw, 36px)", fontWeight: 700, margin: 0, color: "#F5F0E8", lineHeight: 1.1 }}>
                    Room Assignments
                  </h1>
                </div>
                <div style={{ display: "flex", gap: "12px", alignItems: "center", flexWrap: "wrap" }}>
                  <div style={{ background: "rgba(245,240,232,0.1)", borderRadius: "8px", padding: "8px 14px", border: "1px solid rgba(245,240,232,0.15)" }}>
                    <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "22px", fontWeight: 700, color: "#F5F0E8" }}>{totalGuests}</span>
                    <span style={{ fontSize: "11px", color: "#C9B99A", marginLeft: "4px" }}>/ {totalCapacity} guests</span>
                  </div>
                  <button onClick={clearAll} style={{
                    background: "rgba(212,145,142,0.2)", border: "1px solid rgba(212,145,142,0.3)",
                    color: "#E8C4A0", padding: "8px 16px", borderRadius: "8px",
                    fontSize: "11px", fontWeight: 700, cursor: "pointer",
                    fontFamily: "'Nunito Sans', sans-serif", letterSpacing: "0.5px", textTransform: "uppercase", transition: "all 0.15s",
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(212,145,142,0.35)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.background = "rgba(212,145,142,0.2)"; }}
                  >Clear All</button>
                </div>
              </div>
              <p style={{ color: "#A89A7B", fontSize: "12px", margin: "8px 0 0", lineHeight: 1.4 }}>
                Click any room on the floor plan to assign guests. Rooms fill with color as you add names.
              </p>
            </div>
          </div>

          {/* Legend + Floor Tabs */}
          <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "16px 28px 0", display: "flex", flexWrap: "wrap", justifyContent: "space-between", alignItems: "center", gap: "12px" }}>
            <div style={{ display: "flex", gap: "0", borderRadius: "8px", overflow: "hidden", border: "1px solid #D5CCBC" }}>
              {[{ key: "first", label: "First Floor & Ground" }, { key: "second", label: "Second Floor" }].map((f) => (
                <button key={f.key} onClick={() => { setActiveFloor(f.key); setSelectedRoom(null); }} style={{
                  padding: "10px 20px",
                  background: activeFloor === f.key ? "#5C6B4F" : "#FFFCF7",
                  color: activeFloor === f.key ? "#F5F0E8" : "#6B5D4F",
                  border: "none", cursor: "pointer", fontFamily: "'Nunito Sans', sans-serif",
                  fontSize: "12px", fontWeight: 700, letterSpacing: "0.5px", transition: "all 0.15s",
                }}>{f.label}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", alignItems: "center" }}>
              {Object.entries(TYPE_STYLES).map(([type, s]) => (
                <div key={type} style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                  <div style={{ width: "12px", height: "12px", borderRadius: "3px", background: s.bg, border: "1px solid " + s.border }} />
                  <span style={{ fontSize: "10px", color: "#6B5D4F", fontWeight: 600 }}>{s.label}</span>
                </div>
              ))}
              <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                <div style={{ width: "12px", height: "12px", borderRadius: "3px", background: "#F5F0E8", border: "1px solid #D5CCBC" }} />
                <span style={{ fontSize: "10px", color: "#6B5D4F", fontWeight: 600 }}>Empty</span>
              </div>
            </div>
          </div>

          {/* Main Content */}
          <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "16px 28px 40px", display: "flex", gap: "20px", flexWrap: "wrap", alignItems: "flex-start" }}>
            {/* Map */}
            <div style={{
              flex: "1 1 600px", position: "relative", background: "#FFFCF7",
              borderRadius: "12px", border: "1px solid #D5CCBC",
              boxShadow: "0 4px 20px rgba(61,43,31,0.06)", overflow: "hidden",
            }}>
              <div style={{
                position: "absolute", inset: 0,
                backgroundImage: "radial-gradient(#D5CCBC 0.5px, transparent 0.5px)",
                backgroundSize: "20px 20px", opacity: 0.3, pointerEvents: "none",
              }} />

              <div style={{ paddingBottom: "72%", position: "relative" }}>
                {Object.entries(currentRooms).map(([roomNum, pos]) => (
                  <RoomBox key={roomNum} roomNum={Number(roomNum)} style={pos}
                    onSelect={handleSelect} isSelected={selectedRoom === Number(roomNum)}
                    guestCount={guestCount(roomNum)}
                    guests={assignments[roomNum] || [""]} />
                ))}
                {currentLabels.map((label, i) => (
                  <LabelBox key={i} text={label.text} style={label.style} italic={label.italic} />
                ))}

                {activeFloor === "first" && (<React.Fragment>
                  <div style={{ position: "absolute", left: "30%", top: "56%", width: "62%", height: "1px", background: "linear-gradient(90deg, transparent, #C9B99A, #C9B99A, transparent)", pointerEvents: "none" }} />
                  <div style={{ position: "absolute", left: "43%", top: "22%", width: "1px", height: "68%", background: "linear-gradient(180deg, transparent, #C9B99A, #C9B99A, transparent)", pointerEvents: "none" }} />
                </React.Fragment>)}

                {activeFloor === "second" && (<React.Fragment>
                  <div style={{ position: "absolute", left: "38%", top: "66%", width: "57%", height: "1px", background: "linear-gradient(90deg, transparent, #C9B99A, #C9B99A, transparent)", pointerEvents: "none" }} />
                  <div style={{ position: "absolute", left: "25%", top: "3%", width: "1px", height: "85%", background: "linear-gradient(180deg, transparent, #C9B99A, #C9B99A, transparent)", pointerEvents: "none" }} />
                  <div style={{ position: "absolute", left: "3%", top: "89%", width: "93%", height: "1px", background: "linear-gradient(90deg, transparent, #C9B99A, #C9B99A, transparent)", pointerEvents: "none" }} />
                </React.Fragment>)}
              </div>
            </div>

            {/* Guest Panel */}
            <div style={{ flex: "0 0 auto", width: "100%", maxWidth: "360px", position: "sticky", top: "20px", animation: "fadeUp 0.3s ease" }}>
              {selectedRoom ? (
                <GuestPanel key={selectedRoom} roomNum={selectedRoom} assignments={assignments} onChange={handleChange} onClose={() => setSelectedRoom(null)} />
              ) : (
                <div style={{ background: "#FFFCF7", borderRadius: "12px", border: "1px dashed #C9B99A", padding: "32px 24px", textAlign: "center" }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "20px", color: "#8A7D6B", fontStyle: "italic", marginBottom: "8px" }}>Select a room</div>
                  <div style={{ fontSize: "12px", color: "#A89A7B", lineHeight: 1.5 }}>Click any room on the floor plan to assign guests. Rooms light up with color once names are added.</div>
                </div>
              )}

              {totalGuests > 0 && (
                <div style={{ marginTop: "16px", background: "#FFFCF7", borderRadius: "12px", border: "1px solid #D5CCBC", padding: "16px", maxHeight: "300px", overflowY: "auto" }}>
                  <div style={{ fontSize: "10px", fontWeight: 700, color: "#A89A7B", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "10px" }}>Assigned Rooms</div>
                  {Object.entries(assignments)
                    .filter(([_, guests]) => guests.some((g) => g.trim()))
                    .sort((a, b) => Number(a[0]) - Number(b[0]))
                    .map(([roomNum, guests]) => (
                      <div key={roomNum}
                        onClick={() => {
                          setActiveFloor(FIRST_FLOOR_ROOM_NUMS.includes(Number(roomNum)) ? "first" : "second");
                          setSelectedRoom(Number(roomNum));
                        }}
                        style={{
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          padding: "8px 10px", borderRadius: "6px", cursor: "pointer", marginBottom: "4px",
                          transition: "background 0.15s",
                          background: selectedRoom === Number(roomNum) ? "#E8E0D4" : "transparent",
                        }}
                        onMouseEnter={(e) => { if (selectedRoom !== Number(roomNum)) e.currentTarget.style.background = "#F5F0E8"; }}
                        onMouseLeave={(e) => { if (selectedRoom !== Number(roomNum)) e.currentTarget.style.background = "transparent"; }}
                      >
                        <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "15px", fontWeight: 700, color: "#3D2B1F" }}>Rm {roomNum}</span>
                        <span style={{ fontSize: "12px", color: "#6B5D4F", fontFamily: "'Nunito Sans', sans-serif", textAlign: "right", maxWidth: "200px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {guests.filter((g) => g.trim()).join(", ")}
                        </span>
                      </div>
                    ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<QuecheeInnMap />);
  </script>
</body>
</html>
